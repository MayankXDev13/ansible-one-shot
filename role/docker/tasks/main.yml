---
# tasks file for role/docker

- name: update system
  apt:
    name: "*"
    state: latest

- name: Install Docker.io
  apt:
    name: docker.io
    state: latest
    update_cache: yes

- name: Ensure Docker service is running and enabled
  service:
    name: docker
    state: started
    enabled: yes

- name:  Add users to Docker group
  user:
    name: "{{ item }}"
    groups: docker
    append: true # sudo usermod -aG docker ubuntu
  loop: "{{ docker_users }}"

- name: Restart Docker
  service:
    name: docker
    state: restarted

- name:  Getting docker version
  command: docker --version
  register: docker_version

- name:  Print docker version
  debug: 
    msg: "{{ docker_version.stdout }}"
    
